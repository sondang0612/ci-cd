name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - staging
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Run test
        run: npm test

  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: develop

    steps:
      - name: Deploy to Dev
        env:
          NODE_ENV: ${{ vars.NODE_ENV }}
        run: echo "Deploying to NODE_ENV=$NODE_ENV server..."

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy to Staging
        env:
          NODE_ENV: ${{ vars.NODE_ENV }}
        run: echo "Deploying to NODE_ENV=$NODE_ENV server..."

  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to Production
        env:
          NODE_ENV: ${{ vars.NODE_ENV }}
        run: echo "Deploying to NODE_ENV=$NODE_ENV server..."
